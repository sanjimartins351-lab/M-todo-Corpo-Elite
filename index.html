<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Gatinhos</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        #cat-button {
            padding: 20px 40px;
            font-size: 24px;
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.2s;
        }

        #cat-button:hover {
            background-color: #ff3333;
            transform: scale(1.05);
        }

        #cat-button:active {
            transform: scale(0.95);
        }

        #cat-container {
            margin-top: 30px;
            max-width: 90%;
        }

        img {
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none; /* Esconde a imagem inicialmente */
        }
    </style>
</head>
<body>

    <button id="cat-button" onclick="showCat()">ME CLIQUE!</button>

    <div id="cat-container">
        <img id="cat-image" src="" alt="Gatinho fofo">
    </div>

    <script>
        function showCat() {
            const img = document.getElementById('cat-image');
            // Gera um link aleatório para evitar cache e sempre mostrar um gato novo
            img.src = "https://cataas.com/cat?width=500&height=500&" + new Date().getTime();
            img.style.display = "block";
        }
    </script>

</body>
</html>
