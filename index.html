<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE TREINO ROBÓTICO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --robot-green: #00ff41;
            --cyber-blue: #00d2ff;
            --dark-core: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-core);
            color: white;
            /* Fonte robótica principal */
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
        }

        /* Título com efeito vibrante/robótico */
        .robot-title {
            font-size: 5rem;
            text-align: center;
            padding: 100px 20px;
            color: var(--robot-green);
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 0 0 10px var(--robot-green), 0 0 20px var(--robot-green);
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.3; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Estilo de "Terminal" para os detalhes */
        .terminal-box {
            background: rgba(0, 255, 65, 0.05);
            border: 2px solid var(--robot-green);
            padding: 30px;
            border-radius: 5px;
            font-family: 'Roboto Mono', monospace; /* Fonte estilo código */
            line-height: 1.8;
            position: relative;
            box-shadow: inset 0 0 15px rgba(0, 255, 65, 0.2);
        }

        .terminal-box::before {
            content: "SYSTEM_STATUS: ACTIVE";
            position: absolute;
            top: -15px;
            left: 20px;
            background: var(--dark-core);
            padding: 0 10px;
            color: var(--robot-green);
            font-size: 0.8rem;
        }

        .highlight {
            color: var(--cyber-blue);
            font-weight: bold;
        }

        /* Botão Futurista */
        .btn-cyber {
            display: block;
            width: fit-content;
            margin: 50px auto;
            padding: 20px 50px;
            background: transparent;
            color: var(--robot-green);
            border: 3px solid var(--robot-green);
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }

        .btn-cyber:hover {
            background: var(--robot-green);
            color: var(--dark-core);
            box-shadow: 0 0 30px var(--robot-green);
        }

        .vagas-counter {
            text-align: center;
            color: #ff003c;
            font-size: 1.2rem;
            margin-top: 20px;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1 class="robot-title">SHAPE_BOT_30D</h1>

    <div class="container">
        <div class="terminal-box">
            <p>> INICIANDO PROTOCOLO DE HIPERTROFIA...</p>
            <p>> <span class="highlight">DIETA INTEGRADA:</span> CÁLCULO DE MACROS AUTOMATIZADO.</p>
            <p>> <span class="highlight">TREINO OTIMIZADO:</span> MÁXIMA EFICIÊNCIA MECÂNICA.</p>
            <p>> <span class="highlight">ESTRATÉGIA:</span> REPROGRAMAÇÃO MUSCULAR EM 720 HORAS.</p>
            <p>> AGUARDANDO COMANDO DO USUÁRIO...</p>
        </div>

        <div class="vagas-counter">
            [ERRO] APENAS 08 UNIDADES DE MEMÓRIA RESTANTES
        </div>

        <button class="btn-cyber" onclick="alert('ACESSO CONCEDIDO, RECRUTA!')">
            EXECUTAR_PROJETO.EXE
        </button>
    </div>

</body>
</html>
