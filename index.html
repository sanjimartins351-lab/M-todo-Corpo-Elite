<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAINROT UNIVERSE 💀🔥</title>
    <style>
        /* FONTE E FUNDO PSICODÉLICO */
        body {
            margin: 0;
            background: #000;
            font-family: 'Arial Black', sans-serif;
            color: #fff;
            overflow-x: hidden;
            background: radial-gradient(circle, #ff00ff, #00ffff, #39ff14);
            background-size: 600% 600%;
            animation: colors 5s infinite alternate;
        }

        @keyframes colors {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* TÍTULO QUE EXPLODE */
        .titulo-crazy {
            font-size: 6rem;
            text-align: center;
            padding: 50px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 8px 8px 0px #ff0000, -8px -8px 0px #0000ff;
            animation: pulse 0.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1) skew(2deg); }
            50% { transform: scale(1.1) skew(-2deg); }
            100% { transform: scale(1) skew(2deg); }
        }

        /* CONTAINER DOS PERSONAGENS */
        .brainrot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .personagem-card {
            background: rgba(0,0,0,0.8);
            border: 10px solid #fff;
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            transition: 0.1s;
            cursor: pointer;
        }

        .personagem-card:hover {
            transform: scale(1.2) rotate(10deg);
            background: #fff;
            color: #000;
            border-color: #39ff14;
        }

        .sprite {
            font-size: 100px;
            margin-bottom: 20px;
            display: block;
        }

        /* SEÇÃO 6 7 8 9 */
        .seven-six-chaos {
            background: #fff;
            color: #000;
            padding: 60px;
            text-align: center;
            border-top: 15px solid #ff00ff;
            border-bottom: 15px solid #00ffff;
            margin: 50px 0;
        }

        .seven-six-chaos h2 {
            font-size: 4rem;
            margin: 0;
        }

        .number-flash {
            font-size: 10rem;
            color: #ff0000;
            font-weight: bold;
        }

        /* BOTÕES DE SONS (ZUEIRA) */
        .btn-sound {
            background: #39ff14;
            border: none;
            padding: 30px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 10px 10px 0px #000;
            margin: 10px;
            cursor: pointer;
        }

        .btn-sound:active {
            transform: translate(5px, 5px);
            box-shadow: 0px 0px 0px #000;
        }

        marquee {
            font-size: 3rem;
            background: #000;
            color: #39ff14;
            padding: 15px;
            border-bottom: 5px solid #fff;
        }
    </style>
</head>
<body>

    <marquee scrollamount="25">SKIBIDI 🚽 SIGMA 🤫 OHIO 💀 SMURF CAT 🐱 BLUE TIE 👔 GRIMACE 🥤</marquee>

    <h1 class="titulo-crazy">BRAINROT WORLD</h1>

    <div class="brainrot-grid">
        
        <div class="personagem-card" onclick="play('Brrr Skibidi Dop Dop Yes Yes!')">
            <span class="sprite">🚽</span>
            <h2>SKIBIDI TOILET</h2>
            <p>O REI DOS BANHEIROS</p>
        </div>

        <div class="personagem-card" onclick="play('🤫🧏‍♂️ MEWING EM 100%...')">
            <span class="sprite">🗿</span>
            <h2>GIGACHAD SIGMA</h2>
            <p>BEBA O SUCO DO RIZZ</p>
        </div>

        <div class="personagem-card" onclick="play('WE LIVE, WE LOVE, WE LIE! 🍄')">
            <span class="sprite">🐱</span>
            <h2>SMURF CAT</h2>
            <p>WE LIVE WE LOVE WE LIE</p>
        </div>

        <div class="personagem-card" onclick="play('A GRAVATA AZUL TE ENCONTROU! 👔')">
            <span class="sprite">👔</span>
            <h2>THE BLUE TIE</h2>
            <p>NÍVEL DE RIZZ: INFINITO</p>
        </div>

    </div>

    <div class="seven-six-chaos">
        <h2>A MALDIÇÃO DO:</h2>
        <div class="number-flash" id="flash">7</div>
        <p>SIX... SEVEN... SIX... SEVEN...</p>
    </div>

    <div style="text-align: center; padding-bottom: 100px;">
        <button class="btn-sound" onclick="play('VOCÊ FOI TAXADO PELO FANUM! 🍔')">FANUM TAX 🍔</button>
        <button class="btn-sound" onclick="play('ERM... WHAT THE SIGMA? 🤓')">WHAT THE SIGMA? 🤓</button>
        <button class="btn-sound" onclick="play('POV: VOCÊ ESTÁ EM OHIO! 💀')">VIAJAR PARA OHIO 💀</button>
    </div>

    <script>
        // Função para os personagens "falarem"
        function play(msg) {
            alert(msg);
            document.body.style.filter = "invert(100%)";
            setTimeout(() => {
                document.body.style.filter = "invert(0%)";
            }, 100);
        }

        // Efeito visual do 6 e 7
        const flash = document.getElementById('flash');
        setInterval(() => {
            flash.innerText = flash.innerText === "7" ? "6" : "7";
            flash.style.color = flash.innerText === "7" ? "#ff0000" : "#0000ff";
        }, 300);
    </script>

</body>
</html>
