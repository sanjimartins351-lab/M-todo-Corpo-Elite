<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Menino Ney</title>
    <style>
        /* Estilo do Fundo */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #009739 0%, #fed100 100%); /* Cores do Brasil */
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        /* Botão Central */
        #btn-neymar {
            padding: 30px 60px;
            font-size: 2rem;
            background-color: #002776;
            color: white;
            border: 5px solid white;
            border-radius: 100px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }

        #btn-neymar:hover {
            transform: scale(1.1);
            background-color: #001a50;
        }

        #btn-neymar:active {
            transform: scale(0.9);
        }

        /* Overlay da Tela Cheia */
        #fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: none; /* Escondido por padrão */
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #fullscreen-overlay img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Botão para Sair da Tela Cheia */
        #btn-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            cursor: pointer;
            font-family: sans-serif;
            border-radius: 5px;
        }

        #btn-close:hover {
            background: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

    <button id="btn-neymar" onclick="ativarNeymar()">VER O ADULTO NEY</button>

    <div id="fullscreen-overlay">
        <button id="btn-close" onclick="fecharNeymar()">SAIR X</button>
        <img src="https://tm.ibxk.com.br/2022/11/24/24183515082186.jpg" alt="Neymar Jr">
    </div>

    <script>
        function ativarNeymar() {
            // Mostra o overlay
            const overlay = document.getElementById('fullscreen-overlay');
            overlay.style.display = 'flex';
            
            // Tenta colocar o navegador em tela cheia de verdade (opcional)
            if (overlay.requestFullscreen) {
                overlay.requestFullscreen();
            }
        }

        function fecharNeymar() {
            // Esconde o overlay
            const overlay = document.getElementById('fullscreen-overlay');
            overlay.style.display = 'none';

            // Sai da tela cheia do navegador
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    </script>

</body>
</html>
